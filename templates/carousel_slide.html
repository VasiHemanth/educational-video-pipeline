<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carousel Slide</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 1080px;
      height: 1080px;
      overflow: hidden;
      font-family: 'Inter', -apple-system, sans-serif;
      background: #0A0A0A;
    }

    /* ── MIDNIGHT PURPLE THEME ── */
    .theme-purple {
      background: #0A0A0A;
      color: #FFFFFF;
    }

    .theme-purple .glow-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
    }

    .theme-purple .glow-main {
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, #6D28D9 0%, #9333EA 40%, transparent 70%);
      bottom: -200px;
      left: 50%;
      transform: translateX(-50%);
      opacity: 0.55;
    }

    .theme-purple .glow-accent {
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, #EC4899 0%, transparent 70%);
      top: -100px;
      right: -100px;
      opacity: 0.25;
    }

    /* ── WHITE PURPLE THEME ── */
    .theme-white {
      background: #FFFFFF;
      color: #1A1A2E;
    }

    .theme-white .glow-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      pointer-events: none;
    }

    .theme-white .glow-main {
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, #EDE9FE 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      opacity: 0.8;
    }

    /* ── SHARED LAYOUT ── */
    .slide {
      position: relative;
      width: 1080px;
      height: 1080px;
      display: flex;
      flex-direction: column;
      padding: 72px 80px 0 80px;
      overflow: hidden;
    }

    /* ── PROGRESS DOTS ── */
    .progress {
      position: absolute;
      top: 60px;
      right: 80px;
      display: flex;
      gap: 10px;
      align-items: center;
      z-index: 20;
    }

    .dot {
      height: 8px;
      border-radius: 4px;
      transition: all 0.3s;
    }

    /* Purple theme dots */
    .theme-purple .dot {
      background: rgba(255, 255, 255, 0.2);
      width: 32px;
    }

    .theme-purple .dot.active {
      background: linear-gradient(90deg, #8B5CF6, #EC4899);
      width: 48px;
    }

    .theme-purple .dot.done {
      background: rgba(139, 92, 246, 0.5);
      width: 32px;
    }

    /* White theme dots */
    .theme-white .dot {
      background: #E5E7EB;
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }

    .theme-white .dot.active {
      background: #7C3AED;
      width: 12px;
      height: 12px;
    }

    /* ── LABEL PILL ── */
    .label-pill {
      display: inline-flex;
      align-items: center;
      padding: 8px 22px;
      border-radius: 100px;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 28px;
      align-self: flex-start;
    }

    .theme-purple .label-pill {
      border: 2px solid #8B5CF6;
      color: #C4B5FD;
      background: rgba(139, 92, 246, 0.12);
    }

    .theme-white .label-pill {
      border: 2px solid #7C3AED;
      color: #7C3AED;
      background: #F3EEFF;
    }

    /* ── HEADLINE ── */
    .headline {
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -1px;
      margin-bottom: 32px;
      position: relative;
      z-index: 10;
    }

    .theme-purple .headline {
      color: #FFFFFF;
      font-size: 74px;
    }

    .theme-white .headline {
      color: #1A1A2E;
      font-size: 70px;
    }

    /* Purple underline accent for white theme */
    .theme-white .headline-accent {
      display: block;
      height: 6px;
      width: 140px;
      background: #7C3AED;
      border-radius: 3px;
      margin-top: 16px;
    }

    /* Pink divider for purple theme */
    .theme-purple .divider {
      height: 3px;
      width: 100%;
      background: linear-gradient(90deg, #8B5CF6, #EC4899, transparent);
      border-radius: 2px;
      margin-bottom: 32px;
    }

    /* ── SUBTEXT ── */
    .subtext {
      font-size: 34px;
      font-weight: 500;
      line-height: 1.5;
      position: relative;
      z-index: 10;
    }

    .theme-purple .subtext {
      color: #D1D5DB;
    }

    .theme-white .subtext {
      color: #4B5563;
    }

    /* ── LIST ITEMS (body slides) ── */
    .list-items {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-top: 8px;
    }

    .list-item {
      display: flex;
      align-items: center;
      gap: 24px;
      padding: 18px 24px;
      border-radius: 16px;
      font-size: 32px;
      font-weight: 600;
      position: relative;
      z-index: 10;
    }

    .theme-purple .list-item {
      background: rgba(255, 255, 255, 0.04);
      border-left: 4px solid #EC4899;
      color: #E5E7EB;
    }

    .theme-white .list-item {
      background: #F3EEFF;
      border-left: 4px solid #7C3AED;
      color: #1A1A2E;
    }

    .list-item .item-icon {
      font-size: 28px;
      opacity: 0.8;
    }

    /* ── NUMBERED LIST ── */
    .numbered-list {
      display: flex;
      flex-direction: column;
      gap: 18px;
      margin-top: 8px;
    }

    .numbered-item {
      display: flex;
      align-items: center;
      gap: 24px;
      font-size: 32px;
      font-weight: 600;
      position: relative;
      z-index: 10;
    }

    .numbered-item .num {
      font-size: 40px;
      font-weight: 900;
      min-width: 60px;
    }

    .theme-purple .numbered-item .num {
      color: #A78BFA;
    }

    .theme-white .numbered-item .num {
      color: #7C3AED;
    }

    .theme-purple .numbered-item .text {
      color: #E5E7EB;
    }

    .theme-white .numbered-item .text {
      color: #1A1A2E;
    }

    /* ── CARD GRID (2x2 layout) ── */
    .card-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 12px;
      position: relative;
      z-index: 10;
    }

    .card {
      padding: 28px 24px;
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .theme-white .card {
      background: #F3EEFF;
    }

    .theme-purple .card {
      background: rgba(139, 92, 246, 0.1);
      border: 1px solid rgba(139, 92, 246, 0.25);
    }

    .card .card-icon {
      font-size: 36px;
    }

    .card .card-title {
      font-size: 26px;
      font-weight: 700;
    }

    .card .card-desc {
      font-size: 22px;
      font-weight: 400;
      line-height: 1.4;
    }

    .theme-white .card .card-title {
      color: #1A1A2E;
    }

    .theme-white .card .card-desc {
      color: #6B7280;
    }

    .theme-purple .card .card-title {
      color: #E9D5FF;
    }

    .theme-purple .card .card-desc {
      color: #9CA3AF;
    }

    /* ── PULLQUOTE ── */
    .pullquote {
      position: relative;
      z-index: 10;
      margin-top: 24px;
      padding: 0 12px;
    }

    .pullquote .quote-mark {
      font-size: 80px;
      line-height: 0.6;
      font-family: Georgia, serif;
      display: inline-block;
    }

    .theme-purple .pullquote .quote-mark {
      color: #8B5CF6;
    }

    .theme-white .pullquote .quote-mark {
      color: #7C3AED;
    }

    .pullquote .quote-text {
      font-size: 42px;
      font-weight: 800;
      line-height: 1.2;
      font-style: italic;
      margin-top: -10px;
    }

    .theme-purple .pullquote .quote-text {
      color: #FFFFFF;
    }

    .theme-white .pullquote .quote-text {
      color: #1A1A2E;
    }

    .pullquote .attribution {
      font-size: 22px;
      font-weight: 500;
      margin-top: 14px;
    }

    .theme-purple .pullquote .attribution {
      color: #9CA3AF;
    }

    .theme-white .pullquote .attribution {
      color: #9CA3AF;
    }

    /* ── RISK ITEMS ── */
    .risk-items {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-top: 8px;
    }

    .risk-item {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 16px 24px;
      border-radius: 14px;
      font-size: 30px;
      font-weight: 600;
      position: relative;
      z-index: 10;
    }

    .theme-purple .risk-item {
      background: rgba(239, 68, 68, 0.08);
      border-left: 4px solid #EF4444;
      color: #E5E7EB;
    }

    /* ── CTA SLIDE ── */
    .cta-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      gap: 24px;
      position: relative;
      z-index: 10;
      padding: 0 20px;
      /* Leave 100px room at bottom for HV branding bar */
      padding-bottom: 120px;
    }

    .cta-content .cta-headline {
      font-size: 60px;
      font-weight: 900;
      line-height: 1.1;
      letter-spacing: -1px;
    }

    .theme-purple .cta-content .cta-headline {
      color: #FFFFFF;
    }

    .theme-white .cta-content .cta-headline {
      color: #1A1A2E;
    }

    .cta-divider {
      height: 3px;
      width: 200px;
      border-radius: 2px;
    }

    .theme-purple .cta-divider {
      background: linear-gradient(90deg, #8B5CF6, #EC4899);
    }

    .theme-white .cta-divider {
      background: #7C3AED;
      width: 160px;
      height: 6px;
      border-radius: 3px;
    }

    .cta-subtext {
      font-size: 30px;
      font-weight: 500;
      line-height: 1.5;
    }

    .theme-purple .cta-subtext {
      color: #D1D5DB;
    }

    .theme-white .cta-subtext {
      color: #6B7280;
    }

    .cta-buttons {
      display: flex;
      gap: 20px;
      margin-top: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .cta-btn {
      padding: 18px 36px;
      border-radius: 100px;
      font-size: 26px;
      font-weight: 700;
      white-space: nowrap;
      cursor: pointer;
    }

    .cta-btn-primary {
      background: linear-gradient(135deg, #8B5CF6, #EC4899);
      color: #FFFFFF;
      border: none;
    }

    .theme-white .cta-btn-primary {
      background: #7C3AED;
    }

    .cta-btn-secondary {
      background: transparent;
      color: #C4B5FD;
      border: 2px solid #8B5CF6;
    }

    .theme-white .cta-btn-secondary {
      color: #7C3AED;
      border-color: #7C3AED;
    }

    /* ── HV BRANDING (CTA slide only — bottom bar) ── */
    .hv-branding {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 100px;
      display: flex;
      align-items: center;
      padding: 0 80px;
      z-index: 20;
    }

    .theme-purple .hv-branding {
      border-top: 1px solid rgba(255, 255, 255, 0.08);
    }

    .theme-white .hv-branding {
      border-top: 1px solid #E5E7EB;
    }

    .hv-badge {
      width: 56px;
      height: 56px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 900;
      flex-shrink: 0;
      margin-right: 18px;
    }

    .theme-purple .hv-badge {
      background: #FFFFFF;
      color: #0A0A0A;
    }

    .theme-white .hv-badge {
      background: #7C3AED;
      color: #FFFFFF;
    }

    .hv-label {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .theme-purple .hv-label {
      color: #FFFFFF;
    }

    .theme-white .hv-label {
      color: #7C3AED;
    }

    /* ── SWIPE CUE ── */
    .swipe-cue {
      position: absolute;
      bottom: 40px;
      right: 80px;
      font-size: 26px;
      font-weight: 700;
      z-index: 20;
    }

    .theme-purple .swipe-cue {
      background: linear-gradient(90deg, #8B5CF6, #EC4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .theme-white .swipe-cue {
      color: #7C3AED;
    }

    .content-zone {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      flex: 1;
      gap: 0;
      padding-bottom: 100px;
      /* room for swipe cue */
    }
  </style>
</head>

<body>
  <!-- Slide HTML is injected dynamically via window.__SLIDE_DATA__ -->
  <div id="root"></div>

  <script>
    (() => {
      // ── DATA & RENDER ──────────────────────────────────────────────────────────────
      const data = window.__SLIDE_DATA__ || {};
      const { slide, theme, totalSlides } = data;
      const T = theme || 'purple'; // 'purple' or 'white'

      function dots(current, total) {
        let html = '<div class="progress">';
        for (let i = 1; i <= total; i++) {
          const cls = i === current ? 'active' : i < current ? 'done' : '';
          html += `<div class="dot ${cls}"></div>`;
        }
        html += '</div>';
        return html;
      }

      function labelPill(label) {
        if (!label) return '';
        return `<div class="label-pill">${label}</div>`;
      }

      function swipeCue(show) {
        if (!show) return '';
        return `<div class="swipe-cue">Swipe →</div>`;
      }

      function hvBranding() {
        return `
    <div class="hv-branding">
      <div class="hv-badge">HV</div>
      <div class="hv-label">AI Cloud Architect</div>
    </div>
  `;
      }

      function renderCoverSlide(s) {
        return `
    ${dots(s.slide_index, totalSlides)}
    <div class="content-zone" style="justify-content: center; padding-top: 60px;">
      <h1 class="headline">${s.headline}</h1>
      ${T === 'purple' ? '<div class="divider"></div>' : '<span class="headline-accent"></span><br><br>'}
      <p class="subtext">${s.subtext || ''}</p>
    </div>
    ${swipeCue(s.has_swipe_cue)}
  `;
      }

      function renderInsightSlide(s) {
        const items = (s.body_items || []).map(item =>
          `<div class="list-item"><span>${item}</span></div>`
        ).join('');
        const sub = s.subtext ? `<p class="subtext" style="font-size:36px; margin-bottom:24px; line-height:1.4;">${s.subtext}</p>` : '';
        return `
    ${dots(s.slide_index, totalSlides)}
    <div class="content-zone" style="padding-top: 20px;">
      ${labelPill(s.label)}
      <h2 class="headline" style="font-size:60px; margin-bottom:24px;">${s.headline}</h2>
      ${sub}
      <div class="list-items">${items}</div>
    </div>
    ${swipeCue(s.has_swipe_cue)}
  `;
      }

      function renderListSlide(s) {
        const items = (s.list_items || []).map(item =>
          `<div class="numbered-item"><span class="num">${item.number}</span><span class="text">${item.text}</span></div>`
        ).join('');
        return `
    ${dots(s.slide_index, totalSlides)}
    <div class="content-zone" style="padding-top: 20px;">
      ${labelPill(s.label)}
      <h2 class="headline" style="font-size:58px; margin-bottom:24px;">${s.headline}</h2>
      <div class="numbered-list">${items}</div>
    </div>
    ${swipeCue(s.has_swipe_cue)}
  `;
      }

      function renderRiskSlide(s) {
        const items = (s.risk_items || []).map(item =>
          `<div class="risk-item"><span>⚠️</span><span>${item}</span></div>`
        ).join('');
        const quote = s.pullquote
          ? `<div class="pullquote"><span class="quote-mark">"</span><p class="quote-text">${s.pullquote}</p></div>`
          : '';
        return `
    ${dots(s.slide_index, totalSlides)}
    <div class="content-zone" style="padding-top: 20px;">
      ${labelPill(s.label)}
      <h2 class="headline" style="font-size:58px;">${s.headline}</h2>
      <div class="risk-items">${items}</div>
      ${quote}
    </div>
    ${swipeCue(s.has_swipe_cue)}
  `;
      }

      function renderQuoteSlide(s) {
        const attribution = s.attribution ? `<p class="attribution">— ${s.attribution}</p>` : '';
        const sub = s.subtext ? `<p class="subtext" style="margin-top:24px;">${s.subtext}</p>` : '';
        return `
    ${dots(s.slide_index, totalSlides)}
    <div class="content-zone" style="justify-content:center; padding-top:60px;">
      ${labelPill(s.label)}
      <div class="pullquote">
        <span class="quote-mark">"</span>
        <p class="quote-text">${s.quote || s.headline}</p>
        <span class="quote-mark" style="float:right;">"</span>
        ${attribution}
      </div>
      ${sub}
    </div>
    ${swipeCue(s.has_swipe_cue)}
  `;
      }

      function renderCardSlide(s) {
        const cards = (s.list_items || []).map(item =>
          `<div class="card">
      <div class="card-icon">${item.icon || '▸'}</div>
      <div class="card-title">${item.title || item.text}</div>
      <div class="card-desc">${item.desc || ''}</div>
    </div>`
        ).join('');
        return `
    ${dots(s.slide_index, totalSlides)}
    <div class="content-zone" style="padding-top: 20px;">
      ${labelPill(s.label)}
      <h2 class="headline" style="font-size:56px; margin-bottom:20px;">${s.headline}</h2>
      <div class="card-grid">${cards}</div>
    </div>
    ${swipeCue(s.has_swipe_cue)}
  `;
      }

      function renderCtaSlide(s) {
        return `
    ${dots(s.slide_index, totalSlides)}
    <div class="cta-content">
      <h2 class="cta-headline">${s.headline}</h2>
      <div class="cta-divider"></div>
      <p class="cta-subtext">${s.subtext || ''}</p>
      <div class="cta-buttons">
        <button class="cta-btn cta-btn-primary">${s.cta_primary || 'Follow for daily AI insights →'}</button>
        <button class="cta-btn cta-btn-secondary">${s.cta_secondary || 'Save this post 🔖'}</button>
      </div>
    </div>
    ${hvBranding()}
  `;
      }

      // ── DISPATCH ──────────────────────────────────────────────────────────────────
      const typeMap = {
        cover: renderCoverSlide,
        problem: renderInsightSlide,
        insight: renderInsightSlide,
        payoff: renderInsightSlide,
        list: renderListSlide,
        risk: renderRiskSlide,
        quote: renderQuoteSlide,
        architecture: renderInsightSlide,
        card: renderCardSlide,
        cta: renderCtaSlide,
      };

      const root = document.getElementById('root');
      root.className = `slide theme-${T}`;

      // Glow orbs
      root.innerHTML = `
  <div class="glow-orb glow-main"></div>
  <div class="glow-orb glow-accent"></div>
`;

      const render = typeMap[slide?.type] || renderInsightSlide;
      root.innerHTML += render(slide);
    })();
  </script>
</body>

</html>
